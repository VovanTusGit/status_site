<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Command Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500&display=swap');

        :root {
            --bg-deep: #020205;
            --accent-cyan: #00f2ff;
            --accent-red: #ff0055;
            --glass: rgba(15, 20, 30, 0.8);
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        .star {
            position: absolute; background: white; border-radius: 50%; opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .console {
            position: relative;
            width: 380px;
            padding: 40px;
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        .status-box {
            margin-bottom: 40px;
            padding: 25px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.6rem;
            font-weight: bold;
            text-shadow: 0 0 20px currentColor;
            transition: var(--transition);
        }

        .state-on { color: var(--accent-cyan); }
        .state-off { color: var(--accent-red); }

        .scanline {
            width: 80%; height: 2px; background: currentColor;
            opacity: 0.4; box-shadow: 0 0 10px currentColor;
            margin-top: 15px; transition: var(--transition);
        }

        .button-group { display: flex; gap: 15px; }

        .btn {
            flex: 1; padding: 15px; border: 1px solid rgba(255, 255, 255, 0.2);
            background: transparent; color: #fff; border-radius: 8px;
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 1px; transition: var(--transition);
        }

        .btn-on:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .btn-off:hover { border-color: var(--accent-red); color: var(--accent-red); box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="space-bg" id="starfield"></div>
    <div class="console">
        <h1>Статус системы</h1>
        
        <div class="status-box">
            <div id="status-display" class="status-value state-off">OFF</div>
            <div id="status-line" class="scanline state-off"></div>
        </div>

        <div class="button-group">
            <button class="btn btn-on" onclick="updateStatus('on')">ON</button>
            <button class="btn btn-off" onclick="updateStatus('off')">OFF</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('status-display');
        const line = document.getElementById('status-line');

        function updateStatus(state, updateURL = true) {
            if (state === 'on') {
                display.innerText = 'SYSTEM ONLINE';
                display.className = 'status-value state-on';
                line.className = 'scanline state-on';
            } else {
                display.innerText = 'SYSTEM OFFLINE';
                display.className = 'status-value state-off';
                line.className = 'scanline state-off';
            }
            if (updateURL) {
                const newURL = window.location.protocol + "//" + window.location.host + window.location.pathname + '?status=' + state;
                window.history.pushState({ path: newURL }, '', newURL);
            }
        }

        function init() {
            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            if (status === 'on' || status === 'off') {
                updateStatus(status, false);
            }
        }

        init();
        window.onpopstate = function() {
            const params = new URLSearchParams(window.location.search);
            updateStatus(params.get('status') || 'off', false);
        };
    </script>
</body>
</html>
